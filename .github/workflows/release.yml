name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: infuse-linux-x86_64
          - os: macos-latest
            artifact_name: infuse-macos-aarch64
          - os: windows-latest
            artifact_name: infuse-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/release/infuse ${{ matrix.artifact_name }}

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/release/infuse.exe ${{ matrix.artifact_name }}

      - name: Generate SHA-256 checksum (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Generate SHA-256 checksum (macOS)
        if: matrix.os == 'macos-latest'
        run: shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Generate SHA-256 checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact_name }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact_name }}" | Out-File -FilePath ${{ matrix.artifact_name }}.sha256 -Encoding ascii

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
